<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Private Story</title>
    <style>
        /* Applying your requested styles */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: white;
            color: black;
            display: flex;
            flex-direction: column;
            -webkit-text-size-adjust: 100%;
        }

        /* Content Area: Occupies whole page */
        #content-container {
            flex: 1;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
            word-wrap: break-word;
        }

        /* Floating Lock Button in the corner */
        #lock-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        #unlock-btn {
            background: black;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Password Input Popover */
        #password-box {
            background: white;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 4px;
            display: none; /* Hidden by default */
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #passwordInput {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
            font-family: Arial, sans-serif;
        }

        #passwordInput::placeholder {
            color: #ccc;
        }

        #submit-btn {
            background: black;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Story Text Styling */
        .story-text {
            font-size: 1.1em;
            white-space: pre-wrap; /* Preserves line breaks from DB */
        }

        .placeholder-text {
            color: #888;
            font-style: italic;
            text-align: center;
            margin-top: 20vh;
        }

        /* Mobile Adjustments */
        @media (max-width: 767px) {
            #content-container {
                padding: 60px 20px 20px 20px; /* Extra top padding for the button */
            }
            #lock-controls {
                top: 10px;
                right: 10px;
            }
            .story-text {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

    <div id="lock-controls">
        <button id="unlock-btn" onclick="togglePasswordBox()">Unlock</button>
        <div id="password-box">
            <input type="password" id="passwordInput" placeholder="Enter Password">
            <button id="submit-btn" onclick="attemptUnlock()">Verify</button>
        </div>
    </div>

    <div id="content-container">
        <div id="display-area" class="placeholder-text">
            This content is locked. Click the button to unlock.
        </div>
    </div>

    <script>
        // REPLACE THIS with your actual Worker URL + the path
        const WORKER_URL = 'https://chat-backend.rsmilga08.workers.dev/check-password';

        function togglePasswordBox() {
            const box = document.getElementById('password-box');
            box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
            if(box.style.display === 'flex') {
                document.getElementById('passwordInput').focus();
            }
        }

        async function attemptUnlock() {
            const pwInput = document.getElementById('passwordInput');
            const pw = pwInput.value;
            const displayArea = document.getElementById('display-area');
            const submitBtn = document.getElementById('submit-btn');

            if (!pw) return;

            submitBtn.innerText = "Checking...";
            submitBtn.disabled = true;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ submittedPassword: pw })
                });

                const result = await response.json();

                if (result.success) {
                    // Inject the story data and apply styling
                    displayArea.innerHTML = `<div class="story-text">${result.data}</div>`;
                    displayArea.classList.remove('placeholder-text');
                    
                    // Hide the lock controls entirely after success
                    document.getElementById('lock-controls').style.display = 'none';
                } else {
                    alert("Incorrect password.");
                    submitBtn.innerText = "Verify";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert("Error connecting to server.");
                submitBtn.innerText = "Verify";
                submitBtn.disabled = false;
            }
        }

        // Allow "Enter" key to submit
        document.getElementById('passwordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                attemptUnlock();
            }
        });
    </script>
</body>
</html>
