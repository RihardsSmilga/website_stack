<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Story Access</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #1e293b; margin-bottom: 1.5rem; font-size: 1.5rem; }
        input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--primary); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #error-msg { color: #ef4444; font-size: 0.875rem; margin-top: 1rem; min-height: 1.25rem; }
        
        /* The content area starts hidden */
        #story-container { display: none; text-align: left; }
        .story-content { line-height: 1.7; color: #334155; white-space: pre-wrap; background: #f1f5f9; padding: 1.5rem; border-radius: 8px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <div id="login-ui">
        <h1>Locked Entry</h1>
        <input type="password" id="passwordInput" placeholder="Enter password..." onkeypress="handleKey(event)">
        <button id="unlockBtn" onclick="attemptUnlock()">Unlock Content</button>
        <div id="error-msg"></div>
    </div>

    <div id="story-container">
        <h1 style="color: var(--primary)">Decrypted Content</h1>
        <div class="story-content" id="storyText"></div>
        <button onclick="location.reload()" style="margin-top: 1.5rem; background: #64748b;">Lock Again</button>
    </div>
</div>

<script>
    // 1. UPDATE THIS URL to your actual Cloudflare Worker URL
    const WORKER_URL = 'https://www.chat-backend.rsmilga08.workers.dev';

    async function attemptUnlock() {
        const passwordField = document.getElementById('passwordInput');
        const btn = document.getElementById('unlockBtn');
        const error = document.getElementById('error-msg');
        const pw = passwordField.value;

        if (!pw) {
            error.textContent = "Please enter a password.";
            return;
        }

        // UI Loading State
        btn.disabled = true;
        btn.textContent = "Verifying...";
        error.textContent = "";

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ submittedPassword: pw })
            });

            const result = await response.json();

            if (response.ok && result.success) {
                // Success! Switch the UI
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('story-container').style.display = 'block';
                document.getElementById('storyText').textContent = result.data;
            } else {
                error.textContent = "Incorrect password. Access denied.";
                passwordField.value = "";
            }
        } catch (err) {
            error.textContent = "Worker connection error. Is it deployed?";
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.textContent = "Unlock Content";
        }
    }

    // Allow "Enter" key to trigger unlock
    function handleKey(e) {
        if (e.key === 'Enter') attemptUnlock();
    }
</script>

</body>
</html>
